<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f2318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CouVaison">
<title>CouVaison – Poule Goliath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --soil:     #0f2318;
  --forest:   #1c4230;
  --moss:     #2d6a4f;
  --leaf:     #52b788;
  --sprout:   #95d5b2;
  --dew:      #d8f3dc;
  --shell:    #f5f0e8;
  --cream:    #faf7f2;
  --yolk:     #e9a825;
  --yolk-lt:  #fef3d0;
  --crack:    #c0392b;
  --crack-lt: #fdecea;
  --ink:      #1a2820;
  --ash:      #6b8270;
  --mist:     #dce8e0;
  --white:    #ffffff;
  --r:        12px;
  --r-sm:     7px;
  --sh:       0 1px 3px rgba(15,35,24,.08), 0 4px 16px rgba(15,35,24,.06);
  --sh-lg:    0 8px 32px rgba(15,35,24,.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 74px;
  -webkit-font-smoothing: antialiased;
}

/* ═══ AUTH ═══════════════════════════════════════════════════════════════════ */
#auth-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  background: var(--soil);
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(45,106,79,.4) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(82,183,136,.12) 0%, transparent 60%);
}
.auth-egg {
  font-size: 52px;
  margin-bottom: 6px;
  filter: drop-shadow(0 4px 12px rgba(82,183,136,.3));
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.auth-brand {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -.02em;
  margin-bottom: 2px;
}
.auth-tagline {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--leaf);
  margin-bottom: 36px;
  font-weight: 500;
}
.auth-card {
  width: 100%;
  max-width: 360px;
  background: var(--white);
  border-radius: 18px;
  padding: 24px;
  box-shadow: var(--sh-lg);
}
.auth-segs {
  display: flex;
  background: var(--shell);
  border-radius: var(--r-sm);
  padding: 3px;
  gap: 3px;
  margin-bottom: 22px;
}
.auth-seg {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 5px;
  background: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ash);
  cursor: pointer;
  transition: all .18s;
}
.auth-seg.on { background: var(--white); color: var(--soil); font-weight: 600; box-shadow: 0 1px 4px rgba(15,35,24,.12); }
.auth-err {
  background: var(--crack-lt);
  color: var(--crack);
  border: 1px solid #f5c6c2;
  border-radius: var(--r-sm);
  padding: 10px 13px;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}
.af { margin-bottom: 14px; }
.af label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--ash);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.af input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--mist);
  border-radius: var(--r-sm);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--ink);
  background: var(--cream);
  -webkit-appearance: none;
  transition: border-color .15s, background .15s;
}
.af input:focus { outline: none; border-color: var(--leaf); background: var(--white); }
.auth-submit {
  width: 100%;
  padding: 14px;
  background: var(--soil);
  color: var(--white);
  border: none;
  border-radius: var(--r-sm);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
  margin-top: 4px;
}
.auth-submit:active { background: var(--forest); transform: scale(.98); }

/* ═══ APP SHELL ═══════════════════════════════════════════════════════════════ */
#app-screen { display: none; }
header {
  background: var(--soil);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 1px 0 rgba(255,255,255,.06), 0 2px 12px rgba(15,35,24,.3);
}
.h-logo { font-size: 22px; }
.h-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700; color: #fff;
  flex: 1; letter-spacing: -.01em; line-height: 1;
}
.h-title small { display: block; font-family: 'Inter', sans-serif; font-size: 10px; color: var(--sprout); font-weight: 400; letter-spacing: .04em; margin-top: 1px; }
.h-user { font-size: 12px; color: var(--yolk); font-weight: 600; }
.admin-pill { display: inline-block; background: var(--yolk); color: var(--soil); font-size: 8px; font-weight: 700; padding: 2px 5px; border-radius: 8px; margin-left: 3px; vertical-align: middle; letter-spacing: .05em; }
#conn-dot { font-size: 10px; }
.logout-btn {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  color: rgba(255,255,255,.7);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}

/* ═══ PANELS ══════════════════════════════════════════════════════════════════ */
.panel { display: none; padding: 14px; animation: fadeUp .22s ease; }
.panel.on { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* ═══ TYPOGRAPHY / LAYOUT ════════════════════════════════════════════════════ */
.sec-head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 14px;
}
.sec-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; color: var(--soil);
  letter-spacing: -.01em;
}
.sec-line { flex: 1; height: 1px; background: var(--mist); }

/* ═══ CARDS ══════════════════════════════════════════════════════════════════ */
.card {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--mist);
  padding: 15px;
  box-shadow: var(--sh);
  margin-bottom: 11px;
}
.card.locked { background: #f7f7f5; border-color: #e8e8e4; }
.card.locked input { background: #f0efed !important; color: #aaa !important; border-color: #e0dedd !important; }
.card-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .1em; color: var(--ash); margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.card-label .bullet { width: 5px; height: 5px; border-radius: 50%; background: var(--leaf); flex-shrink: 0; }
.lock-tag { margin-left: auto; font-size: 10px; color: #bbb; }
.stage-pill {
  font-size: 9px; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; letter-spacing: .04em;
}
.pill-active { background: var(--yolk-lt); color: #7a5000; }
.pill-done   { background: var(--dew); color: var(--moss); }
.pill-wait   { background: #eee; color: #aaa; }

/* ═══ FIELDS ═════════════════════════════════════════════════════════════════ */
.fg { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 9px; }
.fg.solo { grid-template-columns: 1fr; }
.f label { display: block; font-size: 11px; font-weight: 500; color: var(--ash); margin-bottom: 4px; }
.f input {
  width: 100%; padding: 10px 11px;
  border: 1.5px solid var(--mist); border-radius: var(--r-sm);
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  color: var(--ink); background: var(--shell);
  -webkit-appearance: none; transition: border-color .15s;
}
.f input:focus { outline: none; border-color: var(--leaf); background: var(--white); }
.f input[readonly] { background: var(--dew); color: var(--forest); font-weight: 600; }
.f input.auto { background: var(--yolk-lt); color: #7a5000; border-color: #f0d080; font-weight: 600; }
.auto-tag { font-size: 9px; background: var(--dew); color: var(--moss); padding: 2px 5px; border-radius: 8px; font-weight: 700; margin-left: 3px; }
.arrow { text-align: center; color: var(--leaf); font-size: 16px; margin: 1px 0; line-height: 1; }

/* ═══ BUTTONS ════════════════════════════════════════════════════════════════ */
.btn {
  width: 100%; padding: 13px; border-radius: var(--r);
  border: none; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .14s; margin-bottom: 7px; letter-spacing: .01em;
}
.btn:last-child { margin-bottom: 0; }
.btn-p { background: var(--soil); color: #fff; }
.btn-p:active { background: var(--forest); transform: scale(.985); }
.btn-d { background: var(--crack-lt); color: var(--crack); border: 1px solid #f5c6c2; }
.btn-w { background: var(--yolk-lt); color: #7a5000; border: 1px solid #f0d080; }
.btn-sm { padding: 7px 13px; font-size: 12px; width: auto; border-radius: 20px; margin-bottom: 0; }

/* ═══ LOT CARDS ══════════════════════════════════════════════════════════════ */
.lot-card { background: var(--white); border-radius: var(--r); border: 1px solid var(--mist); margin-bottom: 11px; box-shadow: var(--sh); overflow: hidden; }
.lot-hd {
  display: flex; align-items: center;
  background: linear-gradient(135deg, var(--soil) 0%, var(--forest) 60%, var(--moss) 100%);
  padding: 12px 14px; gap: 10px; cursor: pointer; color: #fff;
}
.lot-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif; font-size: 15px; flex-shrink: 0;
}
.lot-info { flex: 1; }
.lot-info .lot-d { font-size: 11px; color: var(--sprout); }
.lot-info .lot-s { font-size: 13px; font-weight: 500; margin-top: 1px; }
.lot-res {
  background: var(--yolk); color: var(--soil);
  padding: 4px 10px; border-radius: 16px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
}
.lot-bd { padding: 13px 14px; display: none; }
.lot-bd.on { display: block; }

.prog { display: flex; gap: 4px; margin-bottom: 10px; }
.prog-s { flex: 1; height: 3px; border-radius: 2px; background: var(--mist); }
.prog-s.done { background: var(--leaf); }
.prog-s.cur  { background: var(--yolk); }

.chips { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.chip { background: var(--shell); border: 1px solid var(--mist); border-radius: var(--r-sm); padding: 7px 9px; }
.chip .cl { font-size: 10px; color: var(--ash); font-weight: 500; margin-bottom: 2px; }
.chip .cv { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
.chip.hl { background: var(--dew); border-color: var(--sprout); }
.chip.hl .cv { color: var(--forest); }
.lot-author { font-size: 11px; color: var(--ash); margin-bottom: 8px; }
.lot-admin-row { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }

/* ═══ DASHBOARD ══════════════════════════════════════════════════════════════ */
.kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 12px; }
.kpi { background: var(--white); border: 1px solid var(--mist); border-radius: var(--r); padding: 14px 12px; text-align: center; box-shadow: var(--sh); }
.kpi.full { grid-column: span 2; }
.kpi.g { background: var(--dew); border-color: var(--sprout); }
.kpi.y { background: var(--yolk-lt); border-color: #f0d080; }
.kv { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--soil); line-height: 1; }
.kpi.full .kv { font-size: 38px; }
.kl { font-size: 10px; color: var(--ash); margin-top: 3px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
.kp { font-size: 11px; color: var(--moss); font-weight: 600; margin-top: 2px; }

.rate-rows .rr { display: flex; align-items: center; padding: 9px 14px; border-bottom: 1px solid var(--mist); gap: 10px; }
.rate-rows .rr:last-child { border-bottom: none; }
.rl { flex: 1; font-size: 12px; }
.bar-w { width: 64px; height: 4px; background: var(--mist); border-radius: 2px; overflow: hidden; }
.bar-f { height: 100%; border-radius: 2px; transition: width .5s ease; }
.rv { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; color: var(--soil); min-width: 38px; text-align: right; }

/* ═══ OBSERVATIONS ═══════════════════════════════════════════════════════════ */
.obs-ta {
  width: 100%; min-height: 130px; padding: 12px;
  border: 1.5px solid var(--mist); border-radius: var(--r-sm);
  font-family: 'Inter', sans-serif; font-size: 14px;
  color: var(--ink); background: var(--shell);
  resize: vertical; line-height: 1.55;
}
.obs-ta:focus { outline: none; border-color: var(--leaf); background: var(--white); }
.obs-view {
  background: var(--yolk-lt); border: 1px solid #f0d080;
  border-radius: var(--r-sm); padding: 14px;
  font-size: 14px; line-height: 1.6; white-space: pre-wrap;
  min-height: 60px;
}
.obs-meta { font-size: 11px; color: var(--ash); margin-top: 7px; }

/* ═══ AIDE ════════════════════════════════════════════════════════════════════ */
.aide-h3 {
  font-family: 'Playfair Display', serif;
  font-size: 16px; color: var(--soil);
  margin-bottom: 12px; padding-bottom: 7px;
  border-bottom: 2px solid var(--dew);
}
.step-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
.step-n {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--soil); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.step-n.warn { background: #e67e22; }
.step-c strong { display: block; font-size: 13px; margin-bottom: 2px; }
.step-c p { font-size: 12px; color: var(--ash); line-height: 1.5; }
.param-r { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--mist); }
.param-r:last-child { border-bottom: none; }
.pl { font-size: 13px; }
.pv { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--forest); }
.pv.w { color: #e67e22; }

.check-bar-wrap { height: 5px; background: var(--mist); border-radius: 3px; overflow: hidden; margin-bottom: 7px; }
.check-bar-fill { height: 100%; background: var(--leaf); border-radius: 3px; transition: width .4s; }
.check-pct-lbl { font-size: 11px; color: var(--moss); font-weight: 600; margin-bottom: 12px; }
.ci { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--mist); }
.ci:last-child { border-bottom: none; }
.ci input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--soil); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
.ci label { font-size: 13px; line-height: 1.4; cursor: pointer; }
.ci.done label { text-decoration: line-through; color: var(--ash); }

/* ═══ EMPTY / TOAST / NAV ════════════════════════════════════════════════════ */
.empty { text-align: center; padding: 44px 20px; color: var(--ash); }
.empty-i { font-size: 46px; margin-bottom: 10px; }
.empty p { font-size: 13px; line-height: 1.6; }

.toast {
  position: fixed; bottom: 84px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--soil); color: #fff;
  padding: 10px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .28s;
  pointer-events: none; white-space: nowrap;
  box-shadow: var(--sh-lg); z-index: 999;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

.bnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--white); border-top: 1px solid var(--mist);
  display: flex; padding: 6px 0 10px;
  box-shadow: 0 -2px 12px rgba(15,35,24,.08); z-index: 99;
}
.nb {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; cursor: pointer;
  color: var(--ash); font-size: 9px; font-family: 'Inter', sans-serif;
  font-weight: 500; padding: 4px; transition: color .14s;
}
.nb.on { color: var(--soil); }
.nb .ni { font-size: 19px; }

.info-box {
  background: var(--dew); border: 1px solid var(--sprout);
  border-radius: var(--r-sm); padding: 11px 13px;
  font-size: 12px; color: var(--forest); line-height: 1.5;
  margin-top: 4px;
}
</style>
</head>
<body>

<!-- ══════════════ AUTH ══════════════ -->
<div id="auth-screen">
  <div class="auth-egg">🥚</div>
  <div class="auth-brand">CouVaison</div>
  <div class="auth-tagline">Suivi · Poule Goliath</div>

  <div class="auth-card">
    <div class="auth-segs">
      <button class="auth-seg on" onclick="authTab('login',this)">Connexion</button>
      <button class="auth-seg" onclick="authTab('reg',this)">Créer un compte</button>
    </div>
    <div id="auth-err" class="auth-err"></div>

    <div id="t-login">
      <div class="af"><label>Email</label><input type="email" id="li-email" placeholder="votre@email.com"></div>
      <div class="af"><label>Mot de passe</label><input type="password" id="li-pass" placeholder="••••••••"></div>
      <button class="auth-submit" onclick="doLogin()">Se connecter</button>
    </div>

    <div id="t-reg" style="display:none">
      <div class="af"><label>Prénom</label><input type="text" id="rg-prenom" placeholder="Votre prénom"></div>
      <div class="af"><label>Email</label><input type="email" id="rg-email" placeholder="votre@email.com"></div>
      <div class="af"><label>Mot de passe</label><input type="password" id="rg-pass" placeholder="Min. 6 caractères"></div>
      <button class="auth-submit" onclick="doRegister()">Créer mon compte</button>
    </div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app-screen">
  <header>
    <div class="h-logo">🥚</div>
    <div class="h-title">CouVaison <small>Poule Goliath</small></div>
    <span class="h-user" id="h-user"></span>
    <span id="conn-dot">⏳</span>
    <button class="logout-btn" onclick="doLogout()">⏻</button>
  </header>

  <div id="p-saisie" class="panel on">
    <div class="sec-head"><h2>Nouveau lot</h2><div class="sec-line"></div></div>
    <div id="form-lot"></div>
  </div>

  <div id="p-lots" class="panel">
    <div class="sec-head"><h2>Mes lots</h2><div class="sec-line"></div><button onclick="renderLots()" style="background:var(--dew);border:1px solid var(--sprout);color:var(--forest);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">↺ Actualiser</button></div>
    <div id="lots-list"></div>
  </div>

  <div id="p-dash" class="panel">
    <div class="sec-head"><h2>Tableau de bord</h2><div class="sec-line"></div></div>
    <div id="dash"></div>
  </div>

  <div id="p-obs" class="panel">
    <div class="sec-head"><h2>Observations</h2><div class="sec-line"></div></div>
    <div id="obs"></div>
  </div>

  <div id="p-aide" class="panel">
    <div class="sec-head"><h2>Guide & Aide</h2><div class="sec-line"></div></div>
    <div id="aide"></div>
  </div>

  <nav class="bnav">
    <button class="nb on" onclick="nav('saisie',this)"><span class="ni">✏️</span>Saisie</button>
    <button class="nb" onclick="nav('lots',this)"><span class="ni">📋</span>Lots</button>
    <button class="nb" onclick="nav('dash',this)"><span class="ni">📊</span>Bilan</button>
    <button class="nb" onclick="nav('obs',this)"><span class="ni">📝</span>Notes</button>
    <button class="nb" onclick="nav('aide',this)"><span class="ni">📖</span>Aide</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════ FIREBASE ══════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  apiKey:"AIzaSyCWriWEhQZAegovxqn26XHWh9UkvMJS2H0",
  authDomain:"suivi-couvaison.firebaseapp.com",

const fbApp = initializeApp(CFG);

const ADMIN = "jeanugh@gmail.com";
let me = null, admin = false, lots = [];

/* ── UTILS ───────────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const n = id => parseFloat($(id)?.value) || 0;
const sv = (id, val) => { const el = $(id); if(el) el.value = Math.max(0, val||0); };
const fd = s => { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; };
const now = () => new Date().toISOString().split('T')[0];

window.toast = msg => {
  const t = $('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2800);
};

/* ── AUTH UI ─────────────────────────────────────────────────────────── */
window.authTab = (id, btn) => {
  document.querySelectorAll('.auth-seg').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  $('t-login').style.display = id==='login' ? 'block' : 'none';
  $('t-reg').style.display   = id==='reg'   ? 'block' : 'none';
  $('auth-err').style.display = 'none';
};
const authErr = msg => { const e=$('auth-err'); e.textContent=msg; e.style.display='block'; };
const fErr = c => ({'auth/user-not-found':'Compte introuvable.','auth/wrong-password':'Mot de passe incorrect.',
  'auth/invalid-email':'Email invalide.','auth/email-already-in-use':'Email déjà utilisé.',
  'auth/weak-password':'Mot de passe trop court.','auth/invalid-credential':'Email ou mot de passe incorrect.'}[c]||'Erreur: '+c);

window.doLogin = async () => {
  const e=$('li-email').value.trim(), p=$('li-pass').value;
  if(!e||!p){authErr('Remplissez tous les champs.');return;}
  try { await signInWithEmailAndPassword(auth,e,p); } catch(er){authErr(fErr(er.code));}
};
window.doRegister = async () => {
  const prenom=$('rg-prenom').value.trim(), e=$('rg-email').value.trim(), p=$('rg-pass').value;
  if(!prenom||!e||!p){authErr('Remplissez tous les champs.');return;}
  if(p.length<6){authErr('Mot de passe : 6 caractères minimum.');return;}
  try {
    const c = await createUserWithEmailAndPassword(auth,e,p);
    await updateProfile(c.user,{displayName:prenom});
    await set(ref(db,'users/'+c.user.uid),{prenom,email:e,role:'collaborateur',createdAt:Date.now()});
  } catch(er){authErr(fErr(er.code));}
};
window.doLogout = async () => { if(confirm('Se déconnecter ?')) await signOut(auth); };

/* ── AUTH STATE ──────────────────────────────────────────────────────── */
onAuthStateChanged(auth, user => {
  if(user){
    me=user; admin=(user.email===ADMIN);
    $('auth-screen').style.display='none';
    $('app-screen').style.display='block';
    const prenom=user.displayName||user.email.split('@')[0];
    $('h-user').innerHTML = prenom+(admin?'<span class="admin-pill">ADMIN</span>':'');
    listen();
    buildForm();
    buildAide();
  } else {
    me=null; admin=false; lots=[];
    $('auth-screen').style.display='flex';
    $('app-screen').style.display='none';
  }
});

/* ── LISTENERS ───────────────────────────────────────────────────────── */
function listen(){
  onValue(ref(db,'lots'), snap => {
    lots=[];
    snap.forEach(c => lots.push({_k:c.key,...c.val()}));
    lots.sort((a,b)=>b.createdAt-a.createdAt);
    $('conn-dot').textContent='🟢';
    // Toujours rafraîchir peu importe l'onglet actif
    renderLots();
    renderDash();
  });
  onValue(ref(db,'observations'), snap => {
    const d=snap.val()||{text:'',by:'',at:''};
    renderObs(d);
  });
}

/* ── NAVIGATION ──────────────────────────────────────────────────────── */
window.nav = (id, btn) => {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  $('p-'+id).classList.add('on');
  btn.classList.add('on');
  // Forcer le rendu à chaque navigation
  if(id==='lots'){ renderLots(); }
  if(id==='dash'){ renderDash(); }
  if(id==='saisie'){ buildForm(); }
};

/* ── FORM NOUVEAU LOT ────────────────────────────────────────────────── */
function buildForm(){
  $('form-lot').innerHTML=`
    <div class="card">
      <div class="card-label"><span class="bullet"></span> Collecte <span class="stage-pill pill-active">Étape 1</span></div>
      <div class="fg">
        <div class="f"><label>Date collecte</label><input type="date" id="f-dc" value="${now()}"></div>
        <div class="f"><label>Qté collectée</label><input type="number" id="f-qt" placeholder="100" min="0" oninput="cBons()"></div>
      </div>
      <div class="fg">
        <div class="f"><label>Fissurés</label><input type="number" id="f-fi" placeholder="0" min="0" oninput="cBons()"></div>
        <div class="f"><label>Bons <span class="auto-tag">AUTO</span></label><input type="number" id="f-bo" readonly class="auto"></div>
      </div>
    </div>
    <div class="arrow">↓</div>
    <div class="card">
      <div class="card-label"><span class="bullet"></span> Incubation <span class="stage-pill pill-active">Étape 2</span></div>
      <div class="fg solo">
        <div class="f"><label>Date d'entrée en incubation</label><input type="date" id="f-di"></div>

    <div class="info-box">ℹ️ Après enregistrement, ouvrez <strong>Mes Lots</strong> pour saisir le Mirage J7, Mirage J14, puis l'Éclosion.</div>`;
}

window.cBons=()=>{ sv('f-bo', n('f-qt')-n('f-fi')); };

window.cM1=(k)=>{ const bons=parseFloat($('ib-'+k)?.textContent)||0; sv('m1f-'+k, bons-n('m1c-'+k)-n('m1m-'+k)); };
window.cM2=(k)=>{ sv('m2f-'+k, n('m1f-'+k)-n('m2c-'+k)-n('m2m-'+k)); };
window.cEc=(k)=>{ sv('ecr-'+k, n('m2f-'+k)-n('ecma-'+k)-n('ecmn-'+k)); };

/* ── SAVE ÉTAPE 1 ────────────────────────────────────────────────────── */
window.saveStep1=async()=>{
  const dc=$('f-dc').value, qt=n('f-qt');
  if(!dc||!qt){toast('⚠️ Date et quantité requises');return;}
  const lot={
    createdAt:Date.now(), createdBy:me.uid, authorName:me.displayName||me.email,
    dateCollecte:dc, dateIncub:$('f-di').value||'',
    qte:qt, fissures:n('f-fi'), bons:n('f-bo'),
    etape:'collecte',
    m1Clairs:'',m1Mortalite:'',m1Fecondes:'',
    m2Clairs:'',m2Mortalite:'',m2Fecondes:'',
    malades:'',mortnes:'',resultat:''
  };
  try{
    await push(ref(db,'lots'),lot);
    buildForm();
    renderLots(); toast('✅ Lot enregistré ! Complétez dans Mes Lots.');
  }catch(e){toast('❌ '+e.message);}
};

/* ── RENDER LOTS ─────────────────────────────────────────────────────── */
function renderLots(){
  const el=$('lots-list');
  const myUid=me?String(me.uid):""; const src=lots;
  if(!src.length){
    el.innerHTML=`<div class="empty"><div class="empty-i">🥚</div><p>Aucun lot enregistré.<br>Commencez par la saisie !</p></div>`;
    return;
  }
  const en={collecte:1,mirage1:2,mirage2:3,eclosion:4};
  el.innerHTML=src.map((lot,i)=>{
    const e=en[lot.etape]||1;
    const dots=[1,2,3,4].map(d=>`<div class="prog-s ${d<e?'done':d===e?'cur':''}"></div>`).join('');
    const canM1=lot.etape==='collecte';
    const canM2=lot.etape==='mirage1';
    const canEc=lot.etape==='mirage2';

    const m1Stat = canM1?'pill-active':e>1?'pill-done':'pill-wait';
    const m2Stat = canM2?'pill-active':e>2?'pill-done':'pill-wait';
    const ecStat = canEc?'pill-active':e>3?'pill-done':'pill-wait';
    const m1Lbl  = canM1?'À saisir':e>1?'Validé ✓':'En attente';
    const m2Lbl  = canM2?'À saisir':e>2?'Validé ✓':'En attente';
    const ecLbl  = canEc?'À saisir':e>3?'Terminé ✅':'En attente';

    return `<div class="lot-card">
      <div class="lot-hd" onclick="tLot('${lot._k}')">
        <div class="lot-num">${src.length-i}</div>
        <div class="lot-info">
          <div class="lot-d">Collecte : ${fd(lot.dateCollecte)}</div>
          <div class="lot-s">${lot.qte} œufs · ${lot.etape==='eclosion'?'Terminé ✅':'En cours'}</div>
        </div>
        <div class="lot-res">${lot.resultat!==''?lot.resultat:'—'} 🐥</div>
      </div>
      <div class="lot-bd" id="bd-${lot._k}">
        <div class="prog">${dots}</div>
        <div class="lot-author">👤 ${lot.authorName||'—'}</div>
        <div class="chips">
          <div class="chip hl"><div class="cl">Collecte</div><div class="cv">${lot.qte} œufs</div></div>
          <div class="chip"><div class="cl">Fissurés</div><div class="cv">${lot.fissures||0}</div></div>
          <div class="chip hl"><div class="cl">Bons → Incub.</div><div class="cv" id="ib-${lot._k}">${lot.bons||0}</div></div>
          <div class="chip"><div class="cl">Date incubation</div><div class="cv">${fd(lot.dateIncub)}</div></div>
        </div>

        <!-- MIRAGE J7 -->
        <div class="card ${canM1?'':'locked'}" style="margin-top:6px;">
          <div class="card-label"><span class="bullet"></span> Mirage J7
            <span class="stage-pill ${m1Stat}">${m1Lbl}</span>
            ${canM1?'':'<span class="lock-tag">🔒 Verrouillé</span>'}
          </div>
          <div class="fg">
            <div class="f"><label>Clairs</label><input type="number" id="m1c-${lot._k}" value="${lot.m1Clairs||''}" placeholder="0" min="0" ${canM1?`oninput="cM1('${lot._k}')"`:' readonly'}></div>
            <div class="f"><label>Mortalité</label><input type="number" id="m1m-${lot._k}" value="${lot.m1Mortalite||''}" placeholder="0" min="0" ${canM1?`oninput="cM1('${lot._k}')"`:' readonly'}></div>
          </div>
          <div class="f"><label>Fécondés J7 <span class="auto-tag">AUTO</span></label><input type="number" id="m1f-${lot._k}" value="${lot.m1Fecondes||''}" readonly class="auto"></div>
          ${canM1?`<button class="btn btn-p" style="margin-top:10px;" onclick="sM1('${lot._k}')">💾 Valider Mirage J7</button>`:''}
        </div>

        <!-- MIRAGE J14 -->
        <div class="card ${canM2?'':'locked'}" style="margin-top:6px;">
          <div class="card-label"><span class="bullet"></span> Mirage J14
            <span class="stage-pill ${m2Stat}">${m2Lbl}</span>
            ${canM2?'':'<span class="lock-tag">🔒 Verrouillé</span>'}
          </div>
          <div class="fg">
            <div class="f"><label>Clairs</label><input type="number" id="m2c-${lot._k}" value="${lot.m2Clairs||''}" placeholder="0" min="0" ${canM2?`oninput="cM2('${lot._k}')"`:' readonly'}></div>
            <div class="f"><label>Mortalité</label><input type="number" id="m2m-${lot._k}" value="${lot.m2Mortalite||''}" placeholder="0" min="0" ${canM2?`oninput="cM2('${lot._k}')"`:' readonly'}></div>
          </div>
          <div class="f"><label>Fécondés J14 <span class="auto-tag">AUTO</span></label><input type="number" id="m2f-${lot._k}" value="${lot.m2Fecondes||''}" readonly class="auto"></div>
          ${canM2?`<button class="btn btn-p" style="margin-top:10px;" onclick="sM2('${lot._k}')">💾 Valider Mirage J14</button>`:''}
        </div>

        <!-- ÉCLOSION -->
        <div class="card ${canEc?'':'locked'}" style="margin-top:6px;">
          <div class="card-label"><span class="bullet"></span> Éclosion
            <span class="stage-pill ${ecStat}">${ecLbl}</span>
            ${canEc?'':'<span class="lock-tag">🔒 Verrouillé</span>'}
          </div>
          <div class="fg">
            <div class="f"><label>Malades</label><input type="number" id="ecma-${lot._k}" value="${lot.malades||''}" placeholder="0" min="0" ${canEc?`oninput="cEc('${lot._k}')"`:' readonly'}></div>
            <div class="f"><label>Mort-nés</label><input type="number" id="ecmn-${lot._k}" value="${lot.mortnes||''}" placeholder="0" min="0" ${canEc?`oninput="cEc('${lot._k}')"`:' readonly'}></div>
          </div>
          <div class="f"><label>🐥 Poussins (Résultat) <span class="auto-tag">AUTO</span></label>
            <input type="number" id="ecr-${lot._k}" value="${lot.resultat!==''?lot.resultat:''}" readonly style="font-size:19px;font-weight:700;color:var(--forest);background:var(--dew);text-align:center;">
          </div>
          ${canEc?`<button class="btn btn-p" style="margin-top:10px;" onclick="sEc('${lot._k}')">✅ Valider l'éclosion</button>`:''}
        </div>

        ${admin?`<div class="lot-admin-row">
          <button class="btn btn-d btn-sm" onclick="dLot('${lot._k}')">🗑 Supprimer</button>

        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

window.tLot = k => $('bd-'+k)?.classList.toggle('on');

/* ── SAVE ÉTAPES ─────────────────────────────────────────────────────── */
window.sM1=async k=>{
  const lot=lots.find(l=>l._k===k);
  const cl=n('m1c-'+k),mo=n('m1m-'+k),fec=Math.max(0,(lot?.bons||0)-cl-mo);
  try{
    await set(ref(db,'lots/'+k+'/m1Clairs'),cl);
    await set(ref(db,'lots/'+k+'/m1Mortalite'),mo);
    await set(ref(db,'lots/'+k+'/m1Fecondes'),fec);
    await set(ref(db,'lots/'+k+'/etape'),'mirage1');
    toast('✅ Mirage J7 validé et verrouillé !');
  }catch(e){toast('❌ '+e.message);}
};
window.sM2=async k=>{
  const lot=lots.find(l=>l._k===k);
  const cl=n('m2c-'+k),mo=n('m2m-'+k),fec=Math.max(0,(lot?.m1Fecondes||0)-cl-mo);
  try{
    await set(ref(db,'lots/'+k+'/m2Clairs'),cl);
    await set(ref(db,'lots/'+k+'/m2Mortalite'),mo);
    await set(ref(db,'lots/'+k+'/m2Fecondes'),fec);
    await set(ref(db,'lots/'+k+'/etape'),'mirage2');
    toast('✅ Mirage J14 validé et verrouillé !');
  }catch(e){toast('❌ '+e.message);}
};
window.sEc=async k=>{
  const lot=lots.find(l=>l._k===k);
  const ma=n('ecma-'+k),mn=n('ecmn-'+k),res=Math.max(0,(lot?.m2Fecondes||0)-ma-mn);
  try{
    await set(ref(db,'lots/'+k+'/malades'),ma);
    await set(ref(db,'lots/'+k+'/mortnes'),mn);
    await set(ref(db,'lots/'+k+'/resultat'),res);
    await set(ref(db,'lots/'+k+'/etape'),'eclosion');
    toast('🐥 Éclosion validée ! Lot terminé.');
  }catch(e){toast('❌ '+e.message);}
};

/* ── ADMIN ACTIONS ───────────────────────────────────────────────────── */
window.dLot=async k=>{
  if(!admin){toast('❌ Réservé à l\'admin');return;}
  if(!confirm('Supprimer ce lot définitivement ?'))return;
  try{await remove(ref(db,'lots/'+k));toast('🗑 Lot supprimé');}catch(e){toast('❌ '+e.message);}
};
window.rLot=async k=>{
  if(!admin){toast('❌ Réservé à l\'admin');return;}
  if(!confirm('Réinitialiser ce lot à l\'étape Collecte ?'))return;
  try{
    const lot=lots.find(l=>l._k===k);
    await set(ref(db,'lots/'+k),{...lot,etape:'collecte',
      m1Clairs:'',m1Mortalite:'',m1Fecondes:'',
      m2Clairs:'',m2Mortalite:'',m2Fecondes:'',
      malades:'',mortnes:'',resultat:''});
    toast('↺ Lot réinitialisé');
  }catch(e){toast('❌ '+e.message);}
};

/* ── DASHBOARD ───────────────────────────────────────────────────────── */
function pc(n,d){return d?Math.round(n/d*1000)/10:0;}
function renderDash(){
  const el=$('dash');
  const myUid=me?String(me.uid):""; const src=lots;
  if(!src.length){el.innerHTML=`<div class="empty"><div class="empty-i">📊</div><p>Aucune donnée disponible.</p></div>`;return;}
  const T=k=>src.reduce((s,l)=>s+(parseFloat(l[k])||0),0);
  const qte=T('qte'),bons=T('bons'),f1=T('m1Fecondes'),f2=T('m2Fecondes'),
        pous=T('resultat'),fiss=T('fissures'),c1=T('m1Clairs'),
        mo1=T('m1Mortalite'),c2=T('m2Clairs'),mo2=T('m2Mortalite'),
        mal=T('malades'),mn=T('mortnes');
  const term=src.filter(l=>l.etape==='eclosion').length;
  const rates=[
    ['Taux de fissure',pc(fiss,qte),'#c0392b'],
    ['Fécondité J7',pc(f1,bons),'#27ae60'],
    ['Fécondité J14',pc(f2,f1),'#1a7a4a'],
    ["Taux d'éclosion",pc(pous,f2),'#0f2318'],
    ['Réussite globale',pc(pous,qte),'#e9a825'],
  ];
  const pertes=[['Fissurés',fiss],['Clairs J7',c1],['Mortalité J7',mo1],['Clairs J14',c2],['Mortalité J14',mo2],['Malades',mal],['Mort-nés',mn]];
  el.innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="kv">${src.length}</div><div class="kl">Lots suivis</div></div>
      <div class="kpi"><div class="kv">${term}</div><div class="kl">Terminés</div></div>
      <div class="kpi"><div class="kv">${qte}</div><div class="kl">Œufs collectés</div></div>
      <div class="kpi y"><div class="kv">${fiss+c1+mo1+c2+mo2+mal+mn}</div><div class="kl">Total pertes</div></div>
      <div class="kpi g full"><div class="kv">${pous} 🐥</div><div class="kl">Total poussins</div><div class="kp">${pc(pous,qte)}% de réussite globale</div></div>
    </div>
    <div class="card">
      <div class="card-label"><span class="bullet"></span> Taux & performances</div>
      <div class="rate-rows">${rates.map(([l,v,c])=>`
        <div class="rr"><div class="rl">${l}</div>
        <div class="bar-w"><div class="bar-f" style="width:${Math.min(v,100)}%;background:${c}"></div></div>
        <div class="rv">${v}%</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-label"><span class="bullet"></span> Détail des pertes</div>
      <div class="rate-rows">${pertes.map(([l,v])=>`
        <div class="rr"><div class="rl">${l}</div><div class="rv" style="color:var(--crack)">${v}</div></div>`).join('')}
      </div>
    </div>
    ${admin?`<button class="btn btn-d" onclick="resetAll()">⚠️ Réinitialiser TOUTES les données</button>`:''}`;
}
window.resetAll=async()=>{
  if(!admin)return;
  if(!confirm('⚠️ Supprimer TOUS les lots ? Irréversible.'))return;
  if(!confirm('Dernière confirmation — supprimer toutes les données ?'))return;
  try{await remove(ref(db,'lots'));toast('🗑 Toutes les données supprimées');}
  catch(e){toast('❌ '+e.message);}
};

/* ── OBSERVATIONS ────────────────────────────────────────────────────── */
function renderObs(d){
  const el=$('obs'); if(!el)return;
  if(admin){
    el.innerHTML=`<div class="card">
      <div class="card-label"><span class="bullet"></span> Mes observations (visibles par tous)</div>
      <textarea class="obs-ta" id="obs-ta" placeholder="Rédigez vos observations, consignes ou instructions pour vos collaborateurs…">${d.text||''}</textarea>
      <button class="btn btn-p" style="margin-top:10px;" onclick="saveObs()">💾 Publier</button>
      ${d.at?`<p class="obs-meta">Mis à jour le ${new Date(d.at).toLocaleString('fr-FR')} par ${d.by||'Admin'}</p>`:''}
    </div>`;
  } else {
    el.innerHTML=`<div class="card">
      <div class="card-label"><span class="bullet"></span> Observations de Jean_marie</div>
      ${d.text
        ?`<div class="obs-view">${d.text}</div><p class="obs-meta">Publié le ${d.at?new Date(d.at).toLocaleString('fr-FR'):''}</p>`
        :'<p style="color:var(--ash);font-size:13px;">Aucune observation pour le moment.</p>'}
    </div>`;
  }
}
window.saveObs=async()=>{
  if(!admin)return;
  const text=$('obs-ta')?.value||'';
  try{
    await set(ref(db,'observations'),{text,by:me.displayName||'Admin',at:Date.now()});
    toast('✅ Observations publiées !');
  }catch(e){toast('❌ '+e.message);}
};

    'Vérifier température J1 : 37,5°C – 38°C',
    'Vérifier humidité J1 : 55% – 60%',
    'Mettre en place le retournement automatique ou manuel',
    'Retourner les œufs 3 à 5 fois/jour (J1 à J18)',
    '1er Mirage J7 : retirer clairs et morts',
    '2ème Mirage J14 : contrôler le développement',
    'Arrêter le retournement à J18',
    'Augmenter l\'humidité à 65%–70% à partir de J18',
    'Ne pas ouvrir la couveuse entre J19 et J21',
    'Laisser sécher les poussins 12–24h dans la couveuse',
  ];
  const guide=[
    ['Sélection des œufs','Choisissez des œufs frais (moins de 7 jours), propres, sans fissure ni déformation. Écartez les œufs trop petits, trop gros ou à coquille anormale.'],
    ['Préparation de la couveuse','Nettoyez, désinfectez, préchauffez 24h à 37,5°C–38°C avec 55%–60% d\'humidité avant d\'introduire les œufs.'],
    ['Incubation J1–J7','Maintenez 37,5°C–38°C. Retournez 3 à 5 fois/jour. Vérifiez le niveau d\'eau du bac d\'humidité quotidiennement.'],
    ['1er Mirage J7','Dans l\'obscurité, éclairez chaque œuf par la base. Œuf fécondé : ramifications sanguines visibles. Retirez les œufs clairs (non fécondés) et ceux avec un anneau sanguin (morts).'],
    ['Incubation J8–J14','Poursuivez le retournement. L\'embryon occupe environ la moitié de l\'œuf. Continuez la surveillance température/humidité.'],
    ['2ème Mirage J14','L\'embryon doit occuper les 2/3 de l\'œuf. Retirez les œufs sans activité (mortalité embryonnaire). Fécondés = Fécondés J7 − Clairs − Mortalité.'],
    ['Mise en éclosoir J18','Arrêtez le retournement. Posez les œufs à plat. Montez l\'humidité à 65%–70%. Ne plus ouvrir la couveuse jusqu\'à l\'éclosion.'],
    ['Éclosion J21','Les poussins percent (bec-de-gaz) puis éclosent. Laissez-les sécher 12 à 24h dans la couveuse. N\'aidez pas sauf urgence absolue.'],
  ];
  const params=[
    ['Température J1–J18','37,5°C – 38°C'],['Température J18–J21','37°C – 37,5°C'],
    ['Humidité J1–J17','55% – 60%'],['Humidité J18–J21','65% – 70%'],
    ['Retournement','3 à 5 fois/jour (J1 à J18)'],['1er Mirage','Jour 7'],
    ['2ème Mirage','Jour 14'],['Arrêt retournement','Jour 18'],
    ['Durée d\'incubation','21 jours'],['Séchage poussins','12 à 24h dans couveuse'],
    ['Conservation avant incubation','Max 7 jours à 15°C'],
  ];
  const alertes=[
    ['Température > 39°C','Danger mortel immédiat. Ouvrir la couveuse, laisser refroidir.'],
    ['Humidité < 45%','Membranes collantes → difficultés d\'éclosion. Ajouter de l\'eau immédiatement.'],
    ['Œuf avec odeur forte','Putréfaction. Retirer immédiatement : risque d\'explosion et de contamination.'],
    ['Poussin bloqué au J22+','Humidifier la membrane avec précaution extrême avant toute aide.'],
    ['Coupure de courant > 4h','Possible mortalité embryonnaire. Notez la durée, surveillez au prochain mirage.'],
  ];

  el.innerHTML=`
    <!-- CHECKLIST -->
    <div class="card">
      <div class="aide-h3">✅ Checklist débutant</div>
      <div class="check-bar-wrap"><div class="check-bar-fill" id="cb-fill" style="width:0%"></div></div>
      <div class="check-pct-lbl" id="cb-lbl">0 / ${ck.length} étapes</div>
      ${ck.map((t,i)=>`<div class="ci" id="ci${i}">
        <input type="checkbox" id="ck${i}" onchange="updCk()">
        <label for="ck${i}">${t}</label>
      </div>`).join('')}
    </div>

    <!-- GUIDE -->
    <div class="card">
      <div class="aide-h3">📖 Guide complet de couvaison</div>
      ${guide.map(([t,p],i)=>`<div class="step-row">
        <div class="step-n">${i+1}</div>
        <div class="step-c"><strong>${t}</strong><p>${p}</p></div>
      </div>`).join('')}
    </div>

    <!-- PARAMÈTRES -->
    <div class="card">
      <div class="aide-h3">🌡️ Paramètres & Constantes</div>
      ${params.map(([l,v])=>`<div class="param-r"><div class="pl">${l}</div><div class="pv">${v}</div></div>`).join('')}
    </div>

    <!-- ALERTES -->
    <div class="card">
      <div class="aide-h3">⚠️ Alertes à surveiller</div>
      ${alertes.map(([t,p])=>`<div class="step-row">
        <div class="step-n warn">!</div>
        <div class="step-c"><strong>${t}</strong><p>${p}</p></div>
      </div>`).join('')}
    </div>`;
}
window.updCk=()=>{
  const items=document.querySelectorAll('[id^="ck"]');
  let done=0;
  items.forEach((cb,i)=>{
    const ci=document.getElementById('ci'+i);
    cb.checked?(done++,ci?.classList.add('done')):ci?.classList.remove('done');
  });
  const p=Math.round(done/items.length*100);
  $('cb-fill').style.width=p+'%';
  $('cb-lbl').textContent=`${done} / ${items.length} étapes`;
};

</script>
</body>
</html>
